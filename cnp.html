<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>문장 복사 박스</title>
</head>
<body>

<button id="openPip">핀 모드 열기</button>

<script>
document.getElementById("openPip").onclick = async () => {
  const pipWindow = await documentPictureInPicture.requestWindow({
    width: 450,
    height: 350
  });

  pipWindow.document.title = "문장 복사 박스";

  pipWindow.document.head.innerHTML = `
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 10px;
        margin: 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .box {
        background: #ffffff;
        border: 2px solid #ccc;
        padding: 8px;
        cursor: pointer;
        white-space: pre-line;
        user-select: none;
      }
      .box:active {
        background: #eaeaea;
      }
    </style>
  `;

  pipWindow.document.body.innerHTML = `
    <div class="grid">
      <div class="box">종
명
최</div>

      <div class="box">종
명
최</div>

      <div class="box">종
명
최</div>

      <div class="box">종
명
최</div>

      <div class="box">종
명
최</div>

      <div class="box">종
명
최</div>

      <div class="box">종
명
최</div>

      <div class="box">종
명
최</div>

      <div class="box">종
명
최</div>
    </div>
  `;

  pipWindow.document.querySelectorAll(".box").forEach(box => {
    box.addEventListener("click", async () => {
      try {
        await pipWindow.navigator.clipboard.writeText(box.innerText);
        box.style.borderColor = "#2e7d32";
        setTimeout(() => box.style.borderColor = "#ccc", 300);
      } catch (err) {
        console.error("복사 실패:", err);
      }
    });
  });
};
</script>

</body>
</html>
