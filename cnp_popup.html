<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>문장 복사 박스</title>
</head>
<body>

<button id="openPip">핀 모드 열기</button>

<script>
/* 박스 추가 가능 */
const boxData = [
  { type: "일", command: "없", final: "12" },
  { type: "일", command: "없", final: "1" },
  { type: "일", command: "없", final: "" },

  { type: "명", command: "1)", final: "11" },
  { type: "명", command: "1)", final: "6" },
  { type: "명", command: "1)", final: "" },

  { type: "도", command: "1)", final: "11" },
  { type: "도", command: "1)", final: "3" },
  { type: "도", command: "1)", final: "2" }
];

document.getElementById("openPip").onclick = async () => {
  let win;

  /* 1. PiP 시도 */
  try {
    win = await documentPictureInPicture.requestWindow({
      width: 450,
      height: 350
    });
  } catch {
    /* 2. PiP 차단 시 일반 팝업 */
    win = window.open(
      "",
      "_blank",
      "width=450,height=350,menubar=no,toolbar=no"
    );
  }

  if (!win) return;

  win.document.title = "문장 복사 박스";

  win.document.head.innerHTML = `
    <style>
      body {
        font-family: sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 10px;
      }
      /* box 배열 설정: auto-fill(자동)을 3으로 바꾸면 3x3배열, 4로 바꾸면 4x4배열로 바뀜*/
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
        gap: 8px;
      }
      .box {
        background: #fff;
        border: 2px solid #ccc;
        padding: 6px;
        white-space: pre-line;
        cursor: pointer;
        user-select: none;
      }
      .toast {
        position: fixed;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        background: #000;
        color: #fff;
        padding: 4px 8px;
        font-size: 12px;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .toast.show { opacity: 0.85; }
      textarea {
        position: fixed;
        left: -9999px;
        top: 0;
      }
    </style>
  `;

  win.document.body.innerHTML = `
    <div class="grid"></div>
    <div class="toast"></div>
  `;

  const grid = win.document.querySelector(".grid");
  const toast = win.document.querySelector(".toast");

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 900);
  }

  /* 복사 시도: 3단계 */
  async function copyText(text) {
    /* 1단계 */
    try {
      if (win.navigator.clipboard) {
        await win.navigator.clipboard.writeText(text);
        return "success";
      }
    } catch {}

    /* 2단계 */
    try {
      const ta = win.document.createElement("textarea");
      ta.value = text;
      win.document.body.appendChild(ta);
      ta.select();
      const ok = win.document.execCommand("copy");
      ta.remove();
      if (ok) return "success";
    } catch {}

    /* 3단계 */
    return "manual";
  }

  boxData.forEach(item => {
    const box = win.document.createElement("div");
    box.className = "box";
    box.innerText = `종:${item.type}
명:${item.command}
최:${item.final}`;
    grid.appendChild(box);

    box.addEventListener("click", async () => {
      const result = await copyText(box.innerText);

      if (result === "success") {
        box.style.borderColor = "#2e7d32";
        showToast("복사되었습니다");
      } else {
        box.style.borderColor = "#f57c00";
        showToast("Ctrl + C를 눌러주세요");
        const range = win.document.createRange();
        range.selectNodeContents(box);
        const sel = win.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }

      setTimeout(() => box.style.borderColor = "#ccc", 400);
    });
  });
};
</script>

</body>
</html>
