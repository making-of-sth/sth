<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TextGrid 시간 확장 변환기</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 900px; margin: 0 auto; background: #f9f9f9; }
        h2 { color: #333; }
        textarea { width: 100%; height: 250px; font-family: monospace; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        textarea[readonly] { background-color: #fff; cursor: pointer; }
        textarea[readonly]:hover { border-color: #0056b3; }
        button { background-color: #17a2b8; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin: 15px 0; font-weight: bold; }
        button:hover { background-color: #138496; }
        .box { margin-bottom: 20px; position: relative; }
        .toast { display: none; position: absolute; bottom: 10px; right: 10px; background: #28a745; color: white; padding: 5px 12px; border-radius: 4px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>TextGrid 시간 확장 변환기 (-0.15s / +0.15s)</h2>
    <p style="color: #666; font-size: 14px;">헤더 영역과 개별 interval 구간을 정밀하게 분리하여 계산 오류를 해결했습니다.</p>
    
    <div class="box">
        <strong>1. 원본 TextGrid 내용 붙여넣기:</strong>
        <textarea id="inputText" placeholder="여기에 TextGrid 파일 내용을 복사해서 붙여넣으세요..."></textarea>
    </div>
    
    <button onclick="convertTextGrid()">TextGrid 변환하기</button>
    
    <div class="box">
        <strong>2. 변환된 결과 (클릭 시 자동 선택 + 복사):</strong>
        <textarea id="outputText" readonly 
                  onfocus="this.select();" 
                  onmouseup="forceCopy(this); return false;" 
                  placeholder="변환된 결과가 여기에 표시됩니다..."></textarea>
        <div id="toastMessage" class="toast">✅ 복사 완료!</div>
    </div>

    <script>
        function convertTextGrid() {
            const input = document.getElementById("inputText").value;
            if (!input.trim()) { alert("내용을 입력해 주세요."); return; }

            const lines = input.replace(/\r\n/g, "\n").split("\n");
            
            let total_xmax_val = 0;
            let total_xmax_str = "";
            for (let line of lines) {
                if (line.includes("xmax =") && !line.includes("item") && !line.includes("intervals")) {
                    let val = parseFloat(line.split("=")[1].trim());
                    if (val > total_xmax_val) {
                        total_xmax_val = val;
                        total_xmax_str = line.split("=")[1].trim();
                    }
                }
            }

            let intervals = [];
            let inIntervalSection = false;
            let currentInterval = null;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                
                if (line.includes("intervals [") && !line.includes("size")) {
                    inIntervalSection = true;
                    if (currentInterval) intervals.push(currentInterval);
                    currentInterval = { xminIdx: -1, xmaxIdx: -1, xminVal: 0, xmaxVal: 0, hasText: false };
                    continue;
                }

                if (inIntervalSection && currentInterval) {
                    if (line.includes("item [") && line.includes("class")) {
                        inIntervalSection = false;
                        break;
                    }

                    if (line.includes("xmin =")) {
                        currentInterval.xminIdx = i;
                        currentInterval.xminVal = parseFloat(line.split("=")[1].trim());
                    } else if (line.includes("xmax =")) {
                        currentInterval.xmaxIdx = i;
                        currentInterval.xmaxVal = parseFloat(line.split("=")[1].trim());
                    } else if (line.includes("text =")) {
                        let textContent = line.split("=")[1].replace(/"/g, "").trim();
                        if (textContent !== "") {
                            currentInterval.hasText = true;
                        }
                    }
                }
            }
            if (currentInterval) intervals.push(currentInterval);

            let count = intervals.length;
            if (count === 0 || intervals[0].xminIdx === -1) { 
                alert("intervals 구간 데이터를 인식하지 못했습니다. 파일 구조를 확인해 주세요."); 
                return; 
            }

            const MARGIN = 0.15;
            let newBoundaries = [0.0];

            for (let i = 0; i < count - 1; i++) {
                let curr_int = intervals[i];
                let next_int = intervals[i+1];
                let orig_boundary = curr_int.xmaxVal;
                let new_b = orig_boundary;

                if (curr_int.hasText && !next_int.hasText) {
                    new_b = orig_boundary + MARGIN;
                } else if (!curr_int.hasText && next_int.hasText) {
                    new_b = orig_boundary - MARGIN;
                }

                new_b = parseFloat(new_b.toFixed(15));

                let prev_b = newBoundaries[newBoundaries.length - 1];
                if (new_b <= prev_b) {
                    new_b = prev_b + 0.000001;
                }

                if (new_b > total_xmax_val) new_b = total_xmax_val;
                newBoundaries.push(new_b);
            }
            newBoundaries.push(total_xmax_val);

            let outputLines = [...lines];

            for (let i = 0; i < count; i++) {
                let inst = intervals[i];
                let n_xmin = newBoundaries[i];
                let n_xmax = newBoundaries[i+1];

                if (inst.xminIdx !== -1) {
                    let xminIndent = outputLines[inst.xminIdx].split("xmin")[0];
                    outputLines[inst.xminIdx] = xminIndent + "xmin = " + (n_xmin === 0 ? "0" : n_xmin);
                }

                if (inst.xmaxIdx !== -1) {
                    let xmaxIndent = outputLines[inst.xmaxIdx].split("xmax")[0];
                    if (i === count - 1) {
                        outputLines[inst.xmaxIdx] = xmaxIndent + "xmax = " + total_xmax_str;
                    } else {
                        outputLines[inst.xmaxIdx] = xmaxIndent + "xmax = " + n_xmax;
                    }
                }
            }

            document.getElementById("outputText").value = outputLines.join("\n");
        }

        function forceCopy(textarea) {
            if (!textarea.value.trim()) return;
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            try {
                var successful = document.execCommand('copy');
                if (successful) { showToast(); return; }
            } catch (err) {
                navigator.clipboard.writeText(textarea.value).then(() => {
                    showToast();
                }).catch(e => { console.log("복사 실패"); });
            }
        }

        function showToast() {
            const toast = document.getElementById("toastMessage");
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 1500);
        }
    </script>
</body>
</html>
